services:
  warehouse:
    image: postgres:15
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - data-tier
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    
  ingest:
    build: .
    depends_on:
      - warehouse
    restart: "no"
    env_file:
      - .env
    networks:
      - data-tier
  viz-tool:
    image: metabase/metabase:latest
    networks:
      - data-tier
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: curl --fail -I http://localhost:3000/api/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      - ingest
      - warehouse
    condition: service_healthy
      
  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
    networks:
      - data-tier
    depends_on:
      - warehouse
    environment:
      - ADMINER_DEFAULT_SERVER=warehouse
      - ADMINER_DEFAULT_DB=${POSTGRES_DB}
      - ADMINER_DEFAULT_USER=${POSTGRES_USER}
      - ADMINER_DEFAULT_PASSWORD=${POSTGRES_PASSWORD}
volumes:
  pg-data:
networks:
  data-tier:
    name: data-tier
    driver: bridge












